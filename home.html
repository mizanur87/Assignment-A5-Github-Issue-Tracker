<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Daisy ui && tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Home | GT Issue Tracker</title>
  </head>

  <body>
    <nav class="bg-base-100 shadow-sm p-8 flex justify-between">
      <div class="flex gap-2 items-center">
        <img class="w-8.75" src="./assets/github-logo.png" alt="" />
        <p class="text-[#1F2937] text-[24px] font-semibold">
          GitHub Issues Tracker
        </p>
      </div>
      <div class="flex gap-2">
        <input
          type="text"
          placeholder="Search issues"
          class="input input-bordered w-24 md:w-auto"
        />
        <button
          class="btn bg-[#4A00FF] text-white text-[16px] py-[10px] px-[12px] rounded-[4px]"
        >
          + New Buttons
        </button>
      </div>
    </nav>

    <main class="w-[70%] mx-auto bg-[#575e67]">
      <!-- Toogle section -->
      <section class="bg-white p-6 my-16 shadow-lg">
        <p class="bg-[#4A00FF] text-white btn">All</p>
        <p class="btn">Open</p>
        <p class="btn">Closed</p>
      </section>

      <!-- Dashboardsection -->
      <section></section>
    </main>

    <!-- Connection home.js -->
    <script src="./home.js"></script>
  </body>
</html>

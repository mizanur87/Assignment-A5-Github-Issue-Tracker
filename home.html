<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Daisy ui && tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font wesome Connection -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Css -->
    <style>
      .active {
        background-color: #4a00ff;
        color: white;
      }
    </style>
    <!-- Title -->

    <title>Home | GT Issue Tracker</title>

    <!-- Title -->
  </head>

  <body class="bg-[#f7f7f7]">
    <nav class="bg-base-100 shadow-sm p-8 flex justify-between">
      <div class="flex gap-2 items-center">
        <img class="w-8.75" src="./assets/github-logo.png" alt="" />
        <p class="text-[#1F2937] text-[24px] font-semibold">
          GitHub Issues Tracker
        </p>
      </div>
      <div class="flex gap-2">
        <input
          id="srchBox"
          type="text"
          placeholder="Search issues"
          class="input input-bordered w-24 md:w-auto"
        />
        <button
          id="srchBtn"
          class="btn bg-[#4A00FF] text-white text-[16px] py-[10px] px-[12px] rounded-[4px]"
        >
          + New Buttons
        </button>
      </div>
    </nav>

    <main class="container mx-auto">
      <!-- Toogle section -->
      <section class="bg-white p-6 my-16 shadow-lg">
        <button class="tg active btn" value="all">All</button>
        <button class="tg btn" value="open">Open</button>
        <button class="tg btn" value="closed">Closed</button>
      </section>

      <!-- Dashboardsection -->
      <section>
        <!-- container -->
        <div
          id="dashContainer"
          class="grid grid-cols-1 gap-2.5 bg-[#FBFBFB] px-10 py-5 sm:grid-cols-4 lg:grid-cols-4 md:grid-cols-4"
        >
          <!-- Dynamically added -->
        </div>
        <div
          id="loadingSpin"
          class="h-[60vh] hidden flex justify-center items-center"
        >
          <span class="loading loading-ball loading-xs"></span>
          <span class="loading loading-ball loading-sm"></span>
          <span class="loading loading-ball loading-md"></span>
          <span class="loading loading-ball loading-lg"></span>
          <span class="loading loading-ball loading-xl"></span>
        </div>
      </section>
    </main>

    <!-- Connection home.js -->
    <script src="./home.js"></script>
  </body>
</html>
